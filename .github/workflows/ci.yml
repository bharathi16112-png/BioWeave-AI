name: BioWeave-AI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    env:
      BIOWEAVE_DISABLE_ML: "true"         # fast tests — no model downloads
      BIOWEAVE_ENABLE_DOCKING: "false"    # no Vina in CI
      BIOWEAVE_CONTACT_EMAIL: "ci@bioweave.test"
      NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Validate smoke test
        run: python validate.py

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint & type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy types-requests

      - name: Ruff lint
        run: ruff check . --select E,W,F,I --ignore E501

      - name: Ruff format check
        run: ruff format --check .

  docker-cpu:
    name: Docker build (CPU)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: cpu
          push: false
          tags: bioweave-ai:ci-cpu
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BIOWEAVE_DISABLE_ML=true

      - name: Smoke test container
        run: |
          docker run --rm \
            -e BIOWEAVE_DISABLE_ML=true \
            -e BIOWEAVE_ENABLE_DOCKING=false \
            bioweave-ai:ci-cpu \
            python validate.py
